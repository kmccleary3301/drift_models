tier: experimental
# Paper Table-8 template: B/16 pixel generator (ImageNet 256x256).
#
# Note on Table-8 ambiguity:
# - Table 8 lists generator "input size" as 32x32x4 for pixel columns.
# - Main text + Appendix A.2/A.3 specify pixel-space generation directly in 256x256x3.
# - This template follows the explicit pixel-space description (256x256x3).

steps: 100000
log-every: 50
save-every: 1000

device: auto
seed: 1337

# Generator (DiT-B/16)
num-classes: 1000
image-size: 256
channels: 3
patch-size: 16
hidden-dim: 768
depth: 12
num-heads: 12
mlp-ratio: 4.0
register-tokens: 16
norm-type: rmsnorm
use-qk-norm: true
use-rope: true
alpha-embedding-type: mlp
qk-norm-mode: l2
rope-mode: 2d_axial
disable-patch-positional-embedding: true
disable-rmsnorm-affine: true

# Optimizer
learning-rate: 2e-4
adam-beta1: 0.9
adam-beta2: 0.95
weight-decay: 0.01
scheduler: warmup_cosine
warmup-steps: 10000

use-ema: true
ema-decay: 0.9995

# Drifting loss computation
groups: 128
negatives-per-group: 64
positives-per-group: 128
temperature: 0.05
drift-temperatures: [0.02, 0.05, 0.2]

# CFG
alpha-min: 1.0
alpha-max: 4.0
alpha-dist: powerlaw
alpha-power: 5.0
unconditional-per-group: 32

# Feature encoder for drifting loss (paper-closer pixel path):
# ResNet-style pixel-MAE + ConvNeXt-V2 multi-stage features.
use-feature-loss: true
feature-encoder: mae_convnextv2
mae-encoder-path: outputs/imagenet/pixel_mae_convnextv2_w640/mae_encoder.pt
mae-encoder-arch: paper_resnet34_unet
mae-input-patchify-size: 8
convnextv2-weights: none
feature-base-channels: 640
feature-stages: 4
feature-temperatures: [0.02, 0.05, 0.2]
feature-temperature-aggregation: sum_drifts_then_mse
feature-loss-term-reduction: sum
include-input-x2-mean: true
include-patch4-stats: true
feature-include-raw-drift-loss: true
feature-raw-drift-loss-weight: 1.0

# Queue + real batches
use-queue: true
queue-prime-samples: 50000
queue-push-batch: 64
queue-per-class-capacity: 128
queue-global-capacity: 1000
queue-store-device: cpu
queue-warmup-mode: class_balanced
queue-warmup-min-per-class: 1
queue-strict-without-replacement: true
queue-report-level: full

real-batch-source: imagefolder
real-imagefolder-root: outputs/datasets/imagenet1k_raw/train
real-loader-batch-size: 8192
real-num-workers: 0
real-sanity-sample-batches: 0
